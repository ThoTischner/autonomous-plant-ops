services:
  sensor-simulator:
    build: ./sensor-simulator
    ports:
      - "8001:8001"
    networks:
      - plant-net
    restart: unless-stopped

  # Ollama läuft nativ auf dem Host (Windows/WSL) mit GPU-Zugriff.
  # Starte Ollama auf Windows mit: $env:OLLAMA_HOST="0.0.0.0"; ollama serve

  llm-agent:
    build: ./llm-agent
    ports:
      - "8002:8002"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=llama3.2:3b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - plant-net
    restart: unless-stopped

  orchestrator:
    build: ./orchestrator
    environment:
      - SENSOR_URL=http://sensor-simulator:8001
      - AGENT_URL=http://llm-agent:8002
      - DASHBOARD_URL=http://dashboard-api:8003
      - CYCLE_INTERVAL=12
      - SCENARIO_CHANCE=0.08
    depends_on:
      - sensor-simulator
      - llm-agent
      - dashboard-api
    networks:
      - plant-net
    restart: unless-stopped

  n8n:
    build: ./n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - WEBHOOK_URL=http://n8n:5678/
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - plant-net
    restart: unless-stopped

  dashboard-api:
    build: ./dashboard/api
    ports:
      - "8003:8003"
    networks:
      - plant-net
    restart: unless-stopped

  dashboard-frontend:
    build: ./dashboard/frontend
    ports:
      - "5173:80"
    depends_on:
      - dashboard-api
    networks:
      - plant-net
    restart: unless-stopped

volumes:
  n8n-data:

networks:
  plant-net:
    driver: bridge
