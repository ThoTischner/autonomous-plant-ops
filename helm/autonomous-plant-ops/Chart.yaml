type: application
version: 0.2.10
appVersion: "1.0.9"
icon: https://raw.githubusercontent.com/ThoTischner/autonomous-plant-ops/main/docs/icon.png
home: https://github.com/ThoTischner/autonomous-plant-ops
sources:
  - https://github.com/ThoTischner/autonomous-plant-ops
keywords:
  - llm
  - ollama
  - industrial-monitoring
