{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autonomous-plant-ops
  labels:
    {{- include "apo.labels" . | nindent 4 }}
  annotations:
    {{- include "apo.ingressAnnotations" . | nindent 4 }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if eq (include "apo.tlsEnabled" .) "true" }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ include "apo.tlsSecret" . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Das Frontend (nginx) liefert die UI und proxyt /api/ -> dashboard-api.
          # Der SSE-Stream /events/stream laeuft ebenfalls hierueber; das
          # Controller-Annotation-Preset (apo.ingressAnnotations) haelt ihn offen.
          - path: {{ .Values.ingress.path | default "/" }}
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: dashboard-frontend
                port:
                  number: {{ (index .Values.services "dashboard-frontend").port }}
{{- end }}
