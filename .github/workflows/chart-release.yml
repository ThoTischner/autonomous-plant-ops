name: Chart Release

on:
  push:
    branches: [main]
    paths:
      - "helm/**"

permissions:
  contents: write
  pages: write

jobs:
  release:
    name: "Release Helm chart -> gh-pages"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm
          mark_as_latest: true
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish artifacthub-repo.yml to gh-pages
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          cp helm/artifacthub-repo.yml /tmp/gh-pages/artifacthub-repo.yml
          cd /tmp/gh-pages
          if ! git diff --quiet; then
            git add artifacthub-repo.yml
            git commit -m "chore: update artifacthub-repo.yml"
            git push origin gh-pages
          fi
