{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: autonomous-plant-ops
  labels:
    {{- include "apo.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Das Frontend (nginx) liefert die UI und proxyt /api/ -> dashboard-api.
          # Der SSE-Stream /events/stream laeuft ebenfalls hierueber; die
          # proxy-buffering/timeout-Annotations in values.yaml halten ihn offen.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard-frontend
                port:
                  number: {{ (index .Values.services "dashboard-frontend").port }}
{{- end }}
