name: Security

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 05:11 UTC — catches newly disclosed CVEs in pinned deps
    - cron: "11 5 * * 1"

permissions:
  contents: read

jobs:
  # Dependency gate for the frontend (mirrors the org pattern in
  # observability-mcp: npm audit at high is the hard gate for JS deps).
  npm-audit:
    name: "npm audit (dashboard-frontend)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (high)
        working-directory: ./dashboard/frontend
        run: npm audit --audit-level=high

  # Trivy is report-only (exit-code 0): findings land in the Security tab
  # for visibility and are remediated via Dependabot PRs — it does not block
  # every merge on (often unfixable) base-image CVEs.
  trivy-fs:
    name: "Trivy — filesystem (deps, secrets, misconfig)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore.yaml
          exit-code: "0"

      - name: Upload Trivy FS SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  image-scan:
    name: "Trivy + SBOM — ${{ matrix.name }}"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: sensor-simulator,   context: sensor-simulator }
          - { name: llm-agent,          context: llm-agent }
          - { name: orchestrator,       context: orchestrator }
          - { name: dashboard-api,      context: dashboard/api }
          - { name: dashboard-frontend, context: dashboard/frontend }
    steps:
      - uses: actions/checkout@v6

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: ${{ matrix.name }}:scan

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ matrix.name }}:scan
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore.yaml
          exit-code: "0"

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

      - name: Generate SBOM (Trivy, SPDX-JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ matrix.name }}:scan
          format: spdx-json
          output: sbom-${{ matrix.name }}.spdx.json
          exit-code: "0"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          retention-days: 90
