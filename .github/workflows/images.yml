name: Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-push:
    name: "${{ matrix.name }} — test & push"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sensor-simulator
            context: sensor-simulator
            test: true
          - name: llm-agent
            context: llm-agent
            test: true
          - name: dashboard-api
            context: dashboard/api
            test: true
          - name: dashboard-frontend
            context: dashboard/frontend
            test: frontend
          - name: orchestrator
            context: orchestrator
            test: false
    steps:
      - uses: actions/checkout@v4

      - name: Lint & unit-test (Python services)
        if: matrix.test == 'true'
        run: |
          docker build -f ${{ matrix.context }}/Dockerfile.test -t ${{ matrix.name }}-test ${{ matrix.context }}/
          docker run --rm ${{ matrix.name }}-test ruff check src/
          docker run --rm ${{ matrix.name }}-test mypy src/ --ignore-missing-imports
          docker run --rm ${{ matrix.name }}-test pytest tests/ -v --tb=short

      - name: Type-check & lint (frontend)
        if: matrix.test == 'frontend'
        run: |
          docker build -f ${{ matrix.context }}/Dockerfile.test -t ${{ matrix.name }}-test ${{ matrix.context }}/
          docker run --rm ${{ matrix.name }}-test npx tsc --noEmit
          docker run --rm ${{ matrix.name }}-test npx eslint src/ --ext .ts,.tsx || true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on non-PR)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
