# Default values for autonomous-plant-ops.

image:
  # -- Registry-Präfix inkl. abschließendem Slash. Leer (`""`) für lokale Builds.
  registry: "ghcr.io/thotischner/"
  # -- Image-Tag. Leer = gepinnt auf `Chart.AppVersion` (empfohlen, reproduzierbar). Für Dev z. B. `main`.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Pull-Secrets für private Registries.
imagePullSecrets: []

# -- Anwendungs-Services. Die Keys werden 1:1 als Kubernetes-Service-Namen verwendet (nicht umbenennen — Inter-Service-URLs sind darauf angewiesen).
# @default -- siehe Felder unten
services:
  sensor-simulator:
    # -- Image-Repository (wird mit `image.registry` und Tag kombiniert).
    image: autonomous-plant-ops/sensor-simulator
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port.
    port: 8001
    # -- HTTP-Pfad für Readiness/Liveness-Probe.
    healthPath: /health
    # -- Umgebungsvariablen.
    env:
      EQUIPMENT_FILE: /data/equipment.json
    # -- Persistente Equipment-Definition (PVC). `enabled: false` = ephemer.
    persistence:
      enabled: true
      size: 1Gi
      mountPath: /data
      storageClass: ""
    # -- Ressourcen-Requests/Limits.
    resources: {}

  llm-agent:
    # -- Image-Repository.
    image: autonomous-plant-ops/llm-agent
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port.
    port: 8002
    # -- HTTP-Pfad für Probes.
    healthPath: /health
    # -- Zusätzliche Umgebungsvariablen. `OLLAMA_HOST` wird automatisch aus `.ollama` gesetzt.
    env:
      OLLAMA_MODEL: "llama3.2:3b"
    # -- Ressourcen-Requests/Limits.
    resources: {}

  orchestrator:
    # -- Image-Repository.
    image: autonomous-plant-ops/orchestrator
    # -- Replica-Anzahl. Muss `1` bleiben (sonst doppelte Szenario-Trigger).
    replicas: 1
    # -- `false` = kein Kubernetes-Service/Port (reiner Loop-Container).
    service: false
    # -- Umgebungsvariablen des Monitoring-Loops.
    env:
      SENSOR_URL: "http://sensor-simulator:8001"
      AGENT_URL: "http://llm-agent:8002"
      DASHBOARD_URL: "http://dashboard-api:8003"
      CYCLE_INTERVAL: "12"
      SCENARIO_CHANCE: "0.08"
    # -- Ressourcen-Requests/Limits.
    resources: {}

  dashboard-api:
    # -- Image-Repository.
    image: autonomous-plant-ops/dashboard-api
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port.
    port: 8003
    # -- HTTP-Pfad für Probes.
    healthPath: /health
    # -- Ressourcen-Requests/Limits.
    resources: {}

  dashboard-frontend:
    # -- Image-Repository (Chainguard/Wolfi-nginx, nonroot; proxyt `/api/` zur dashboard-api).
    image: autonomous-plant-ops/dashboard-frontend
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port (nonroot-nginx -> unprivilegierter Port 8080).
    port: 8080
    # -- nginx braucht beschreibbare Laufzeit-Pfade -> kein read-only Root.
    readOnlyRootFilesystem: false
    # -- Ressourcen-Requests/Limits.
    resources: {}

ollama:
  # -- Betriebsmodus: `external` (externer Endpoint) oder `in-cluster` (Ollama im Cluster).
  mode: external

  external:
    # -- Voll qualifizierte URL des externen Ollama-Servers (nur bei `mode: external`).
    host: "http://host.docker.internal:11434"

  inCluster:
    # -- Ollama-Image (nur bei `mode: in-cluster`).
    image: ollama/ollama:latest
    # -- Image pull policy.
    pullPolicy: IfNotPresent
    # -- Service-Port.
    port: 11434
    # -- Modell (muss nach Deploy einmalig gepullt werden, siehe NOTES).
    model: "llama3.2:3b"
    # -- Ressourcen-Requests/Limits.
    resources: {}
    persistence:
      # -- Persistente Modell-Ablage via PVC.
      enabled: true
      # -- PVC-Größe.
      size: 20Gi
      # -- StorageClass (leer = Default).
      storageClass: ""
    gpu:
      # -- GPU für Ollama aktivieren.
      enabled: false
      # -- GPU-Ressourcenname.
      resourceName: "nvidia.com/gpu"
      # -- Anzahl GPUs.
      count: 1
      # -- NodeSelector für GPU-Nodes.
      nodeSelector: {}
      # -- Tolerations für GPU-Nodes.
      tolerations: []

# -- Exposure des nutzerseitigen Einstiegspunkts (dashboard-frontend). Interne
# Services bleiben immer ClusterIP. Frei mit `ingress` kombinierbar.
frontend:
  service:
    # -- Service-Typ: `ClusterIP` | `NodePort` | `LoadBalancer`.
    type: ClusterIP
    # -- Fester NodePort (nur `type: NodePort`; leer = automatisch 30000–32767).
    nodePort: ""
    # -- Gewünschte LoadBalancer-IP (nur `type: LoadBalancer`, optional).
    loadBalancerIP: ""
    # -- Zusätzliche Service-Annotations (z. B. Cloud-LB-Tuning).
    annotations: {}

ingress:
  # -- Ingress aktivieren (unabhängig vom `frontend.service.type`).
  enabled: true
  # -- IngressClass-Name: `nginx` | `traefik` | eigener Name | `""` (Default-Class).
  className: nginx
  # -- Annotation-Preset passend zum Controller: `nginx` | `traefik` | `none`. Hält den SSE-Stream `/events/stream` offen (kein Buffering, lange Timeouts).
  controller: nginx
  # -- Hostname.
  host: plant-ops.local
  # -- HTTP-Pfad.
  path: /
  # -- pathType: `Prefix` | `Exact` | `ImplementationSpecific`.
  pathType: Prefix
  # -- Zusätzliche Annotations (werden über das Controller-Preset gemerged, können es überschreiben).
  annotations: {}
  tls:
    # -- TLS aktivieren.
    enabled: false
    # -- Name des TLS-Secrets (leer = `<Release>-tls`).
    secretName: ""
  # -- cert-manager-Integration: setzt die Issuer-Annotation und aktiviert TLS automatisch.
  certManager:
    # -- cert-manager-Ausstellung aktivieren.
    enabled: false
    # -- Name des Issuers/ClusterIssuers.
    issuerName: ""
    # -- Issuer-Art: `ClusterIssuer` | `Issuer`.
    issuerKind: ClusterIssuer

# -- Pod-Annotations (alle Deployments).
podAnnotations: {}
# -- NodeSelector (alle Deployments).
nodeSelector: {}
# -- Tolerations (alle Deployments).
tolerations: []
# -- Affinity (alle Deployments).
affinity: {}

# -- Gehärteter SecurityContext für alle Deployments (passt zu den nonroot
# Wolfi/Chainguard-Images: runAsNonRoot, Caps drop ALL, no privilege
# escalation, seccomp RuntimeDefault). Schreibzugriff nur über ein
# /tmp-emptyDir und persistente Volumes.
securityContext:
  # -- SecurityContext aktivieren.
  enabled: true
  # -- UID (nonroot, entspricht den Images).
  runAsUser: 65532
  # -- GID.
  runAsGroup: 65532
  # -- fsGroup für gemountete Volumes.
  fsGroup: 65532
  # -- Root-Dateisystem read-only (global). Pro Service via `services.<name>.readOnlyRootFilesystem` überschreibbar.
  readOnlyRootFilesystem: true
