    - kind: changed
      description: "dashboard-frontend lauscht als nonroot auf Port 8080 (zuvor 80)"
    - kind: security
      description: "Übernommen aus 1.0.2: CVE-2025-62727 (starlette/fastapi), CVE-2026-4800 (lodash); CI mit Trivy/CodeQL/SBOM/Dependabot"
