{{- /*
Generische Deployment-/Service-Erzeugung fuer alle Eintraege unter
.Values.services. Ein Eintrag mit `service: false` (Orchestrator) bekommt
nur ein Deployment ohne Ports/Service.
*/ -}}
{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "apo.labels" $ | nindent 4 }}
    {{- include "apo.selectorLabels" $name | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "apo.selectorLabels" $name | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "apo.selectorLabels" $name | nindent 8 }}
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "apo.image" (dict "root" $ "svc" $svc) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- if ne $svc.service false }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          {{- end }}
          env:
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if eq $name "llm-agent" }}
            - name: OLLAMA_HOST
              value: {{ include "apo.ollamaHost" $ | quote }}
            {{- end }}
          {{- if and (ne $svc.service false) $svc.healthPath }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- end }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and $svc.persistence $svc.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ $svc.persistence.mountPath | default "/data" }}
          {{- end }}
      {{- if and $svc.persistence $svc.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ $name }}-data
      {{- end }}
{{- if and $svc.persistence $svc.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-data
  labels:
    {{- include "apo.labels" $ | nindent 4 }}
    {{- include "apo.selectorLabels" $name | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ $svc.persistence.size | default "1Gi" }}
  {{- if $svc.persistence.storageClass }}
  storageClassName: {{ $svc.persistence.storageClass }}
  {{- end }}
{{- end }}
{{- if ne $svc.service false }}
{{- /* Nur der nutzerseitige dashboard-frontend ist exponierbar; interne
       Services bleiben immer ClusterIP. */ -}}
{{- $fe := eq $name "dashboard-frontend" -}}
{{- $feSvc := dict -}}
{{- if and $fe $.Values.frontend }}{{ $feSvc = $.Values.frontend.service }}{{ end -}}
{{- $svcType := ternary ($feSvc.type | default "ClusterIP") "ClusterIP" $fe }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "apo.labels" $ | nindent 4 }}
    {{- include "apo.selectorLabels" $name | nindent 4 }}
  {{- if and $fe $feSvc.annotations }}
  annotations:
    {{- toYaml $feSvc.annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ $svcType }}
  {{- if and (eq $svcType "LoadBalancer") $fe $feSvc.loadBalancerIP }}
  loadBalancerIP: {{ $feSvc.loadBalancerIP | quote }}
  {{- end }}
  selector:
    {{- include "apo.selectorLabels" $name | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
      {{- if and (eq $svcType "NodePort") $fe $feSvc.nodePort }}
      nodePort: {{ $feSvc.nodePort }}
      {{- end }}
{{- end }}
{{- end }}
