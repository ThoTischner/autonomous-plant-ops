name: Helm CI

on:
  push:
    branches: [main]
    paths: ["helm/**", ".github/workflows/helm-ci.yml", ".github/ct.yaml"]
  pull_request:
    branches: [main]
    paths: ["helm/**", ".github/workflows/helm-ci.yml", ".github/ct.yaml"]

concurrency:
  group: helm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Chart lint (chart-testing)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
      - uses: helm/chart-testing-action@v2
      - name: helm lint
        run: helm lint helm/autonomous-plant-ops
      - name: ct lint
        run: ct lint --config .github/ct.yaml --all
      - name: helm-docs in sync
        run: |
          docker run --rm -v "$PWD:/work" -w /work jnorwood/helm-docs:v1.14.2 \
            helm-docs --chart-search-root=helm --template-files=README.md.gotmpl --sort-values-order=file
          git diff --exit-code -- helm/autonomous-plant-ops/README.md \
            || { echo "::error::helm/autonomous-plant-ops/README.md veraltet — 'helm-docs' lokal ausführen und committen."; exit 1; }

  integration:
    name: "kind deploy + smoke test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Build service images (local, tag ci)
        run: |
          set -e
          build() { docker build -t "ghcr.io/local/autonomous-plant-ops/$1:ci" -f "$2/Dockerfile" "$2"; }
          build sensor-simulator   sensor-simulator
          build llm-agent          llm-agent
          build dashboard-api      dashboard/api
          build dashboard-frontend dashboard/frontend
          build orchestrator       orchestrator

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          config: helm/kind-config.yaml

      - name: Load images into kind
        run: |
          for s in sensor-simulator llm-agent dashboard-api dashboard-frontend orchestrator; do
            kind load docker-image "ghcr.io/local/autonomous-plant-ops/$s:ci" --name chart-testing
          done

      - name: Install ingress-nginx
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.11.2/deploy/static/provider/kind/deploy.yaml
          kubectl -n ingress-nginx wait --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller --timeout=180s

      - uses: azure/setup-helm@v4

      - name: helm install
        run: |
          helm install plant-ops helm/autonomous-plant-ops \
            --set image.registry="ghcr.io/local/" \
            --set image.tag=ci \
            --set image.pullPolicy=Never \
            --set ollama.mode=external \
            --set ollama.external.host=http://ollama.invalid:11434 \
            --wait --timeout 300s || true

      - name: Smoke test
        run: bash scripts/k8s-smoke-test.sh default

      - name: Verify Ingress object
        run: |
          kubectl get ingress autonomous-plant-ops -o jsonpath='{.spec.rules[0].host}' | grep -q plant-ops.local

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods -l app.kubernetes.io/part-of=autonomous-plant-ops || true
          kubectl logs -l app.kubernetes.io/part-of=autonomous-plant-ops --tail=50 --all-containers || true
