name: Security

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 05:11 UTC — catches newly disclosed CVEs in pinned deps
    - cron: "11 5 * * 1"

permissions:
  contents: read

env:
  TRIVY_VERSION: v0.70.0

jobs:
  # Fast, runs on every change: dependency CVEs, leaked secrets, IaC/Dockerfile
  # misconfigurations across the whole repo.
  trivy-fs:
    name: "Trivy — filesystem (deps, secrets, misconfig)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" "$TRIVY_VERSION"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Trivy filesystem scan (SARIF -> Security tab)
        run: |
          trivy fs --no-progress --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL --format sarif -o trivy-fs.sarif .

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy filesystem gate (fail on fixable HIGH/CRITICAL)
        run: |
          trivy fs --no-progress --scanners vuln,secret,misconfig \
            --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 \
            --format table .

  # Heavier: build each service image, scan it for OS+lib CVEs and emit an
  # SBOM. Skipped on PRs to save CI minutes (covered on main / tags / weekly).
  image-scan:
    name: "Trivy + SBOM — ${{ matrix.name }}"
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: sensor-simulator,   context: sensor-simulator }
          - { name: llm-agent,          context: llm-agent }
          - { name: orchestrator,       context: orchestrator }
          - { name: dashboard-api,      context: dashboard/api }
          - { name: dashboard-frontend, context: dashboard/frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b "$RUNNER_TEMP/bin" "$TRIVY_VERSION"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Build image
        run: docker build -t ${{ matrix.name }}:scan ${{ matrix.context }}/

      - name: Trivy image scan (SARIF -> Security tab)
        run: |
          trivy image --no-progress --severity HIGH,CRITICAL \
            --format sarif -o trivy-${{ matrix.name }}.sarif \
            ${{ matrix.name }}:scan

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-image-${{ matrix.name }}

      - name: Generate SBOM (Trivy, SPDX-JSON)
        run: |
          trivy image --no-progress --format spdx-json \
            -o sbom-${{ matrix.name }}.spdx.json ${{ matrix.name }}:scan

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          retention-days: 90

      - name: Trivy image gate (fail on fixable HIGH/CRITICAL)
        run: |
          trivy image --no-progress --severity HIGH,CRITICAL \
            --ignore-unfixed --exit-code 1 --format table \
            ${{ matrix.name }}:scan
