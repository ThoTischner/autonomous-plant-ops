apiVersion: v2
name: autonomous-plant-ops
description: KI-gestuetzte autonome Ueberwachung industrieller Anlagen — Sensor Simulator, LLM Agent, Orchestrator, Dashboard API/Frontend und optional Ollama.
type: application
version: 0.2.1
appVersion: "1.0.1"
icon: https://raw.githubusercontent.com/ThoTischner/autonomous-plant-ops/main/docs/icon.png
home: https://github.com/ThoTischner/autonomous-plant-ops
sources:
  - https://github.com/ThoTischner/autonomous-plant-ops
keywords:
  - llm
  - ollama
  - industrial-monitoring
  - fastapi
  - observability
maintainers:
  - name: ThoTischner
    url: https://github.com/ThoTischner
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: MIT
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Quellcode
      url: https://github.com/ThoTischner/autonomous-plant-ops
    - name: Support
      url: https://github.com/ThoTischner/autonomous-plant-ops/issues
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/images: |
    - name: sensor-simulator
      image: ghcr.io/thotischner/autonomous-plant-ops/sensor-simulator:1.0.1
    - name: llm-agent
      image: ghcr.io/thotischner/autonomous-plant-ops/llm-agent:1.0.1
    - name: orchestrator
      image: ghcr.io/thotischner/autonomous-plant-ops/orchestrator:1.0.1
    - name: dashboard-api
      image: ghcr.io/thotischner/autonomous-plant-ops/dashboard-api:1.0.1
    - name: dashboard-frontend
      image: ghcr.io/thotischner/autonomous-plant-ops/dashboard-frontend:1.0.1
  artifacthub.io/changes: |
    - kind: fixed
      description: "Wiederanlauf-Oszillation behoben: abgeschaltete Anlagen werden nicht erneut notabgeschaltet; deterministischer Auto-Wiederanlauf nach Abkühlung"
    - kind: fixed
      description: "Hochlauf-Transient (niedrige Temperatur direkt nach Neustart) wird nicht mehr als kritisch fehlinterpretiert"
    - kind: fixed
      description: "Deterministischer In-Range-Schutz: gesunde Anlagen werden nicht mehr durch LLM-Fehlurteile abgeschaltet"
    - kind: added
      description: "Dashboard: Sensor-Gutbereiche je Anlage, fuhrpark-spezifische Szenarien mit Erklärungen, Klick-Feedback, deutscher Aktionslog"
