# Default values for autonomous-plant-ops.

image:
  # -- Registry-Präfix inkl. abschließendem Slash. Leer (`""`) für lokale Builds.
  registry: "ghcr.io/thotischner/"
  # -- Image-Tag. Leer = gepinnt auf `Chart.AppVersion` (empfohlen, reproduzierbar). Für Dev z. B. `main`.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Pull-Secrets für private Registries.
imagePullSecrets: []

# -- Anwendungs-Services. Die Keys werden 1:1 als Kubernetes-Service-Namen verwendet (nicht umbenennen — Inter-Service-URLs sind darauf angewiesen).
# @default -- siehe Felder unten
services:
  sensor-simulator:
    # -- Image-Repository (wird mit `image.registry` und Tag kombiniert).
    image: autonomous-plant-ops/sensor-simulator
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port.
    port: 8001
    # -- HTTP-Pfad für Readiness/Liveness-Probe.
    healthPath: /health
    # -- Umgebungsvariablen.
    env:
      EQUIPMENT_FILE: /data/equipment.json
    # -- Persistente Equipment-Definition (PVC). `enabled: false` = ephemer.
    persistence:
      enabled: true
      size: 1Gi
      mountPath: /data
      storageClass: ""
    # -- Ressourcen-Requests/Limits.
    resources: {}

  llm-agent:
    # -- Image-Repository.
    image: autonomous-plant-ops/llm-agent
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port.
    port: 8002
    # -- HTTP-Pfad für Probes.
    healthPath: /health
    # -- Zusätzliche Umgebungsvariablen. `OLLAMA_HOST` wird automatisch aus `.ollama` gesetzt.
    env:
      OLLAMA_MODEL: "llama3.2:3b"
    # -- Ressourcen-Requests/Limits.
    resources: {}

  orchestrator:
    # -- Image-Repository.
    image: autonomous-plant-ops/orchestrator
    # -- Replica-Anzahl. Muss `1` bleiben (sonst doppelte Szenario-Trigger).
    replicas: 1
    # -- `false` = kein Kubernetes-Service/Port (reiner Loop-Container).
    service: false
    # -- Umgebungsvariablen des Monitoring-Loops.
    env:
      SENSOR_URL: "http://sensor-simulator:8001"
      AGENT_URL: "http://llm-agent:8002"
      DASHBOARD_URL: "http://dashboard-api:8003"
      CYCLE_INTERVAL: "12"
      SCENARIO_CHANCE: "0.08"
    # -- Ressourcen-Requests/Limits.
    resources: {}

  dashboard-api:
    # -- Image-Repository.
    image: autonomous-plant-ops/dashboard-api
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port.
    port: 8003
    # -- HTTP-Pfad für Probes.
    healthPath: /health
    # -- Ressourcen-Requests/Limits.
    resources: {}

  dashboard-frontend:
    # -- Image-Repository (nginx; proxyt `/api/` zur dashboard-api).
    image: autonomous-plant-ops/dashboard-frontend
    # -- Replica-Anzahl.
    replicas: 1
    # -- Container-/Service-Port.
    port: 80
    # -- Ressourcen-Requests/Limits.
    resources: {}

ollama:
  # -- Betriebsmodus: `external` (externer Endpoint) oder `in-cluster` (Ollama im Cluster).
  mode: external

  external:
    # -- Voll qualifizierte URL des externen Ollama-Servers (nur bei `mode: external`).
    host: "http://host.docker.internal:11434"

  inCluster:
    # -- Ollama-Image (nur bei `mode: in-cluster`).
    image: ollama/ollama:latest
    # -- Image pull policy.
    pullPolicy: IfNotPresent
    # -- Service-Port.
    port: 11434
    # -- Modell (muss nach Deploy einmalig gepullt werden, siehe NOTES).
    model: "llama3.2:3b"
    # -- Ressourcen-Requests/Limits.
    resources: {}
    persistence:
      # -- Persistente Modell-Ablage via PVC.
      enabled: true
      # -- PVC-Größe.
      size: 20Gi
      # -- StorageClass (leer = Default).
      storageClass: ""
    gpu:
      # -- GPU für Ollama aktivieren.
      enabled: false
      # -- GPU-Ressourcenname.
      resourceName: "nvidia.com/gpu"
      # -- Anzahl GPUs.
      count: 1
      # -- NodeSelector für GPU-Nodes.
      nodeSelector: {}
      # -- Tolerations für GPU-Nodes.
      tolerations: []

ingress:
  # -- Ingress aktivieren.
  enabled: true
  # -- IngressClass.
  className: nginx
  # -- Hostname.
  host: plant-ops.local
  # -- Annotations (Defaults halten den SSE-Stream `/events/stream` offen).
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  tls:
    # -- TLS aktivieren.
    enabled: false
    # -- Name des TLS-Secrets.
    secretName: ""

# -- Pod-Annotations (alle Deployments).
podAnnotations: {}
# -- NodeSelector (alle Deployments).
nodeSelector: {}
# -- Tolerations (alle Deployments).
tolerations: []
# -- Affinity (alle Deployments).
affinity: {}
