    url: https://github.com/ThoTischner
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: MIT
  artifacthub.io/prerelease: "false"
  artifacthub.io/links: |
    - name: Quellcode
      url: https://github.com/ThoTischner/autonomous-plant-ops
    - name: Support
      url: https://github.com/ThoTischner/autonomous-plant-ops/issues
  artifacthub.io/containsSecurityUpdates: "true"
  artifacthub.io/images: |
    - name: sensor-simulator
      image: ghcr.io/thotischner/autonomous-plant-ops/sensor-simulator:1.0.9
    - name: llm-agent
      image: ghcr.io/thotischner/autonomous-plant-ops/llm-agent:1.0.9
    - name: orchestrator
      image: ghcr.io/thotischner/autonomous-plant-ops/orchestrator:1.0.9
    - name: dashboard-api
      image: ghcr.io/thotischner/autonomous-plant-ops/dashboard-api:1.0.9
    - name: dashboard-frontend
      image: ghcr.io/thotischner/autonomous-plant-ops/dashboard-frontend:1.0.9
  artifacthub.io/changes: |
    - kind: changed
      description: "Chart-Re-Release, damit ArtifactHub das OCI-Repo neu verarbeitet und das :artifacthub.io-Metadaten-Artefakt einliest (Verified Publisher). appVersion/Images unverändert (1.0.9)"
    - kind: security
      description: "CVE-Reduktion: Basis-Images (Chainguard/Wolfi + nginx) auf aktuelle Digests neu gepinnt — eliminiert akkumulierte OS-Paket-CVEs"
    - kind: security
      description: "starlette 0.49.1 -> 1.3.1 — behebt CVE-2026-54283/54282/48818/48817/48710 in allen Python-Services"
    - kind: security
      description: "Chart als OCI-Artefakt (ghcr.io) veröffentlicht und keyless mit cosign signiert (Sigstore/GitHub OIDC) — ArtifactHub Signed-Badge"
    - kind: security
      description: "ArtifactHub-Ownership wiederhergestellt (owners.email) — Voraussetzung für Verified-Publisher/Official-Status"
